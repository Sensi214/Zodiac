<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Card Reading</title>
<style>:root{--bg:#09090b;--panel:#141418;--gold:#d4af37;--text:#f3efe5;--muted:#c8bea2;--border:#2a2a2f}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}h1,h2,h3{font-family:Georgia,"Times New Roman",serif}.hero{width:100%;height:340px;object-fit:cover;display:block;border-bottom:1px solid var(--border)}.wrap{max-width:980px;margin:0 auto;padding:24px 18px 46px}h1{color:var(--gold);text-align:center}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px}.out{margin-top:16px;display:none}.out.show{display:block}.btn{display:inline-block;border:0;border-radius:999px;padding:10px 14px;background:linear-gradient(135deg,#e8c66f,#d4af37);color:#17120a;font-weight:700;text-decoration:none;cursor:pointer}.buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}select{width:100%;margin-top:8px;padding:10px;border-radius:8px;border:1px solid #35353f;background:#0f0f14;color:#fff}.out img{max-width:320px;width:100%;border-radius:10px;border:1px solid var(--border)}@media(max-width:820px){.grid{grid-template-columns:1fr}}</style></head>
<body>
<img class="hero" src="https://sensicandleco.com/wp-content/uploads/2026/05/tarot-default.jpg" alt="Card Reading"/>
<main class="wrap">
<h1>Reveal the Candle Connected to Your Cards</h1>
<div class="grid">
<div class="card"><label>Card 1: Current Energy<select id="c1"><option>The Wanderer</option><option>The Hearth</option><option>The Anchor</option><option>The Bloom</option></select></label></div>
<div class="card"><label>Card 2: What Is Opening<select id="c2"><option>The Wanderer</option><option>The Hearth</option><option>The Anchor</option><option>The Bloom</option></select></label></div>
<div class="card"><label>Card 3: What To Release<select id="c3"><option>The Wanderer</option><option>The Hearth</option><option>The Anchor</option><option>The Bloom</option></select></label></div>
<div class="card"><label>Card 4: Candle Guidance<select id="c4"><option>The Wanderer</option><option>The Hearth</option><option>The Anchor</option><option>The Bloom</option></select></label></div>
</div>
<div class="buttons"><button class="btn" id="reveal">Reveal Candle Outcome</button><a class="btn" href="/landing-page.html">Back</a></div>
<section id="out" class="card out"><h2 id="title"></h2><p id="reading" style="color:var(--muted)"></p><p><strong>Scent Profile:</strong> <span id="scent"></span></p><img src="https://sensicandleco.com/wp-content/uploads/2026/05/tarot-default.jpg" alt="Candle"/><div class="buttons"><a class="btn" href="/full-experience.html">Upgrade to Full Experience</a><a class="btn" href="/landing-page.html">Back to Artifact Page</a></div></section>
</main>
<script>
const outcomes={"The Wanderer":{title:"Wanderer Candle",reading:"A doorway opens where courage meets curiosity. Your path moves when you trust your first step.",scent:"Citrus • Cedar • Soft Musk"},"The Hearth":{title:"Hearth Candle",reading:"Warmth gathers around your name. Build slowly and everything meaningful will stay lit.",scent:"Vanilla • Sandalwood • Cinnamon"},"The Anchor":{title:"Anchor Candle",reading:"You are meant to root before you rise. Stability now creates freedom later.",scent:"Amber • Eucalyptus • Cedar"},"The Bloom":{title:"Bloom Candle",reading:"Your season is unfolding in color. Let gentleness lead your next expansion.",scent:"Lavender • Orange • Soft Rose"}};
document.getElementById('reveal').onclick=()=>{const key=document.getElementById('c4').value;const o=outcomes[key];document.getElementById('title').textContent=o.title;document.getElementById('reading').textContent=o.reading;document.getElementById('scent').textContent=o.scent;document.getElementById('out').classList.add('show');};
</script>
</body></html>
