<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Birth Energy</title>
<style>:root{--bg:#09090b;--panel:#141418;--gold:#d4af37;--text:#f3efe5;--muted:#c8bea2;--border:#2a2a2f}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}h1,h2,h3{font-family:Georgia,"Times New Roman",serif}.hero{width:100%;height:340px;object-fit:cover;border-bottom:1px solid var(--border)}.wrap{max-width:900px;margin:0 auto;padding:22px 18px 44px}.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px}.row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}input{width:100%;padding:10px;border-radius:8px;border:1px solid #35353f;background:#0f0f14;color:#fff}.btn{display:inline-block;border:0;border-radius:999px;padding:10px 14px;background:linear-gradient(135deg,#e8c66f,#d4af37);color:#17120a;font-weight:700;text-decoration:none;cursor:pointer}.out{display:none;margin-top:14px}.out.show{display:block}.out img{max-width:340px;width:100%;border:1px solid var(--border);border-radius:10px}@media(max-width:820px){.row{grid-template-columns:1fr}}</style></head>
<body><img class="hero" src="https://sensicandleco.com/wp-content/uploads/2026/05/zodiac-taurus.png" alt="Birth Energy"/><main class="wrap"><h1>Reveal the Candle Aligned With Your Birth Energy</h1>
<section class="card"><div class="row"><label>Birth Month<input id="m" type="number" min="1" max="12"/></label><label>Birth Day<input id="d" type="number" min="1" max="31"/></label><label>Birth Year (optional)<input id="y" type="number" min="1900" max="2099"/></label></div><div style="margin-top:12px"><button id="go" class="btn">Reveal Birth Candle</button></div></section>
<section id="out" class="card out"><h2 id="sign"></h2><p><strong id="candle"></strong></p><p id="reading" style="color:var(--muted)"></p><p><strong>Scent Profile:</strong> <span id="scent"></span></p><img src="https://sensicandleco.com/wp-content/uploads/2026/05/zodiac-taurus.png" alt="Birth candle"/><div style="margin-top:12px"><a class="btn" href="/full-experience.html">Upgrade to Full Experience</a></div></section></main>
<script>
const candles={Aries:["Ignite Candle","Bold fire surrounds your momentum.","Orange • Cinnamon • Cedar"],Taurus:["Emerald Root Candle","You are built for grounded abundance.","Sandalwood • Vanilla • Lemon"],Gemini:["Twin Air Candle","Your dual brilliance opens new doors.","Grapefruit • Lavender • Cedar"],Cancer:["Moonwater Candle","Your care is magnetic and deep.","Lavender • Vanilla • Soft Musk"],Leo:["Solar Flame Candle","Your light invites confidence and joy.","Orange • Amber • Cinnamon"],Virgo:["Clean Earth Candle","Precision becomes peace in your rhythm.","Eucalyptus • Lemon • Cedar"],Libra:["Rose Balance Candle","Harmony is your signature frequency.","Lavender • Vanilla • Orange"],Scorpio:["Shadow Ember Candle","Your depth transforms everything you touch.","Amber • Sandalwood • Cinnamon"],Sagittarius:["Wild Horizon Candle","You are called toward expansive truth.","Grapefruit • Cedar • Orange"],Capricorn:["Mountain Smoke Candle","Discipline turns into legacy.","Sandalwood • Eucalyptus • Amber"],Aquarius:["Electric Sky Candle","Vision flows ahead of its time.","Lemon • Grapefruit • Soft Musk"],Pisces:["Dream Tide Candle","Intuition guides your gentlest power.","Lavender • Vanilla • Eucalyptus"]};
function zodiac(m,d){if((m==3&&d>=21)||(m==4&&d<=19))return"Aries";if((m==4&&d>=20)||(m==5&&d<=20))return"Taurus";if((m==5&&d>=21)||(m==6&&d<=20))return"Gemini";if((m==6&&d>=21)||(m==7&&d<=22))return"Cancer";if((m==7&&d>=23)||(m==8&&d<=22))return"Leo";if((m==8&&d>=23)||(m==9&&d<=22))return"Virgo";if((m==9&&d>=23)||(m==10&&d<=22))return"Libra";if((m==10&&d>=23)||(m==11&&d<=21))return"Scorpio";if((m==11&&d>=22)||(m==12&&d<=21))return"Sagittarius";if((m==12&&d>=22)||(m==1&&d<=19))return"Capricorn";if((m==1&&d>=20)||(m==2&&d<=18))return"Aquarius";return"Pisces";}
document.getElementById('go').onclick=()=>{const m=+document.getElementById('m').value,d=+document.getElementById('d').value;if(!m||!d)return;const s=zodiac(m,d),o=candles[s];document.getElementById('sign').textContent=s;document.getElementById('candle').textContent=o[0];document.getElementById('reading').textContent=o[1];document.getElementById('scent').textContent=o[2];document.getElementById('out').classList.add('show');};
</script></body></html>
