<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sensi Candle Co | Landing</title>
  <style>
    :root{--bg:#09090b;--panel:#141418;--gold:#d4af37;--text:#f3efe5;--muted:#c8bea2;--border:#2a2a2f}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}
    h1,h2,h3{font-family:Georgia,"Times New Roman",serif}
    .hero{width:100%;max-height:560px;object-fit:cover;display:block;border-bottom:1px solid var(--border)}
    .wrap{max-width:1120px;margin:0 auto;padding:36px 18px 60px}
    h1{text-align:center;color:var(--gold);margin:0 0 10px;font-size:clamp(1.9rem,3.8vw,3rem)}
    .sub{text-align:center;max-width:820px;margin:0 auto 28px;color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:20px}
    .card,.gift{background:linear-gradient(180deg,#17171c,#101014);border:1px solid var(--border);border-radius:16px;overflow:hidden}
    .card img,.gift img{width:100%;height:240px;object-fit:cover;display:block;border-bottom:1px solid var(--border)}
    .content{padding:14px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    h2{margin:0;font-size:1.2rem}
    a.btn{display:inline-block;text-decoration:none;padding:10px 14px;border-radius:999px;background:linear-gradient(135deg,#e8c66f,#d4af37);color:#17120a;font-weight:700}
    .gift{margin-top:28px}
    @media (max-width:820px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <img class="hero" src="https://sensicandleco.com/wp-content/uploads/2026/05/image.png" alt="Sensi Candle hero" />
  <main class="wrap">
    <h1>Find the Candle That Matches Your Energy</h1>
    <p class="sub">Choose a path, reveal your candle direction, and unlock a deeper personalized experience when you are ready.</p>

    <section class="grid" aria-label="Experience paths">
      <article class="card"><img src="https://sensicandleco.com/wp-content/uploads/2026/05/tarot-default.jpg" alt="Card Reading" /><div class="content"><h2>Card Reading</h2><a class="btn" href="/card-reading.html">Enter</a></div></article>
      <article class="card"><img src="https://sensicandleco.com/wp-content/uploads/2026/05/zodiac-taurus.png" alt="Birth Energy" /><div class="content"><h2>Birth Energy</h2><a class="btn" href="/birth-energy.html">Enter</a></div></article>
      <article class="card"><img src="https://sensicandleco.com/wp-content/uploads/2026/05/aura-emerald.jpg" alt="Aura Energy" /><div class="content"><h2>Aura Energy</h2><a class="btn" href="/aura-energy.html">Enter</a></div></article>
      <article class="card"><img src="https://sensicandleco.com/wp-content/uploads/2026/05/full-artifact.png" alt="Full Experience" /><div class="content"><h2>Full Experience</h2><a class="btn" href="/full-experience.html">Enter</a></div></article>
    </section>

    <section class="gift">
      <img src="https://sensicandleco.com/wp-content/uploads/2026/05/imagesss.png" alt="Birthday Gift" />
      <div class="content"><h2>Birthday Gift</h2><a class="btn" href="/birthday-gift.html">Open</a></div>
    </section>
  </main>
</body>
</html>
