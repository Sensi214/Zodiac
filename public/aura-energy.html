<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Aura Energy</title>
<style>:root{--bg:#09090b;--panel:#141418;--gold:#d4af37;--text:#f3efe5;--muted:#c8bea2;--border:#2a2a2f}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}h1,h2,h3{font-family:Georgia,"Times New Roman",serif}.hero{width:100%;height:340px;object-fit:cover;border-bottom:1px solid var(--border)}.wrap{max-width:900px;margin:0 auto;padding:22px 18px 44px}.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}button,.btn{display:inline-block;border:0;border-radius:999px;padding:10px 14px;background:linear-gradient(135deg,#e8c66f,#d4af37);color:#17120a;font-weight:700;text-decoration:none;cursor:pointer}.out{display:none;margin-top:14px}.out.show{display:block}.out img{max-width:340px;width:100%;border:1px solid var(--border);border-radius:10px}@media(max-width:820px){.grid{grid-template-columns:1fr}}</style></head>
<body><img class="hero" src="https://sensicandleco.com/wp-content/uploads/2026/05/aura-emerald.jpg" alt="Aura Energy"/><main class="wrap"><h1>Reveal the Candle That Matches Your Aura</h1>
<section class="card"><div class="grid" id="energyGrid"></div></section>
<section id="out" class="card out"><h2 id="energy"></h2><p><strong id="candle"></strong></p><p id="reading" style="color:var(--muted)"></p><p><strong>Scent Profile:</strong> <span id="scent"></span></p><img src="https://sensicandleco.com/wp-content/uploads/2026/05/aura-emerald.jpg" alt="Aura candle"/><div style="margin-top:12px"><a class="btn" href="/full-experience/">Upgrade to Full Experience</a></div></section></main>
<script>
const outcomes={Calm:["Stillwater Candle","Peace returns when your breath slows.","Lavender • Eucalyptus • Vanilla"],Confidence:["Sovereign Candle","Your presence enters before your voice.","Orange • Cedar • Amber"],Love:["Rose Ember Candle","Connection rises from warmth and softness.","Vanilla • Lavender • Orange"],Protection:["Black Salt Candle","Your boundaries are sacred and strong.","Eucalyptus • Cedar • Sandalwood"],Clarity:["Clear Quartz Candle","A clean line appears through the noise.","Lemon • Grapefruit • Cedar"],Renewal:["Green Flame Candle","Fresh cycles open beneath your feet.","Eucalyptus • Lemon • Vanilla"],Abundance:["Golden Root Candle","Prosperity grows where gratitude is steady.","Sandalwood • Amber • Orange"]};
Object.keys(outcomes).forEach(k=>{const b=document.createElement('button');b.textContent=k;b.onclick=()=>{const o=outcomes[k];energy.textContent=k;candle.textContent=o[0];reading.textContent=o[1];scent.textContent=o[2];out.classList.add('show');};energyGrid.appendChild(b);});
</script></body></html>
