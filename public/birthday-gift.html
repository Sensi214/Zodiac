<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Birthday Gift</title>
<style>:root{--bg:#09090b;--panel:#141418;--gold:#d4af37;--text:#f3efe5;--muted:#c8bea2;--border:#2a2a2f}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}h1,h2,h3{font-family:Georgia,"Times New Roman",serif}.hero{width:100%;height:340px;object-fit:cover;border-bottom:1px solid var(--border)}.wrap{max-width:940px;margin:0 auto;padding:22px 18px 44px}.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px}.row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}label{display:block}input,select,textarea{width:100%;margin-top:6px;padding:10px;border-radius:8px;border:1px solid #35353f;background:#0f0f14;color:#fff}.btn{display:inline-block;border:0;border-radius:999px;padding:10px 14px;background:linear-gradient(135deg,#e8c66f,#d4af37);color:#17120a;font-weight:700;text-decoration:none;cursor:pointer}.muted{color:var(--muted)}@media(max-width:820px){.row{grid-template-columns:1fr}}</style></head>
<body><img class="hero" src="https://sensicandleco.com/wp-content/uploads/2026/05/imagesss.png" alt="Birthday Gift"/><main class="wrap"><h1>Birthday Candle Gift</h1><section class="card"><p class="muted">Create a personalized birthday gift candle and proceed to secure checkout.</p><label>Recipient Name<input id="recipientName"/></label><div class="row"><label>Birth Month<input id="birthMonth" type="number" min="1" max="12"/></label><label>Birth Day<input id="birthDay" type="number" min="1" max="31"/></label><label>Birth Year<input id="birthYear" type="number" min="1900" max="2099"/></label></div><label>Gift Message (optional)<textarea id="giftMessage" rows="3"></textarea></label><label>Relationship (optional)<select id="relationship"><option value="">Select one</option><option>partner</option><option>friend</option><option>coworker</option><option>teacher</option><option>client</option><option>family</option></select></label><div style="margin-top:12px"><button id="checkout" class="btn">Checkout Birthday Gift</button></div></section></main>
<script>
const BASE='https://zodiac-1-gj38.onrender.com';
document.getElementById('checkout').onclick=async()=>{const payload={name:document.getElementById('recipientName').value.trim(),birthMonth:+document.getElementById('birthMonth').value,birthDay:+document.getElementById('birthDay').value,birthYear:+document.getElementById('birthYear').value,tarotCard:'wanderer',experience:'full_artifact'};localStorage.setItem('flame_pending_payload',JSON.stringify(payload));localStorage.setItem('birthday_meta',JSON.stringify({giftMessage:document.getElementById('giftMessage').value.trim(),relationship:document.getElementById('relationship').value||''}));const r=await fetch(BASE+'/api/create-checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({productType:'full_artifact'})});const d=await r.json();if(d.url)location.href=d.url;else alert(d.error||'Checkout failed');};
</script></body></html>
