<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Full Experience</title>
<style>:root{--bg:#09090b;--panel:#141418;--gold:#d4af37;--text:#f3efe5;--muted:#c8bea2;--border:#2a2a2f}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}h1,h2,h3{font-family:Georgia,"Times New Roman",serif}.hero{width:100%;height:340px;object-fit:cover;border-bottom:1px solid var(--border)}.wrap{max-width:940px;margin:0 auto;padding:22px 18px 44px}.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px}.row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}label{display:block;font-size:.94rem}input,select{width:100%;margin-top:6px;padding:10px;border-radius:8px;border:1px solid #35353f;background:#0f0f14;color:#fff}.btn{display:inline-block;border:0;border-radius:999px;padding:10px 14px;background:linear-gradient(135deg,#e8c66f,#d4af37);color:#17120a;font-weight:700;text-decoration:none;cursor:pointer}.actions{display:flex;gap:10px;flex-wrap:wrap}.result img{max-width:520px;width:100%;border:1px solid var(--border);border-radius:10px}.muted{color:var(--muted)}@media(max-width:820px){.row{grid-template-columns:1fr}}</style></head>
<body><img class="hero" src="https://sensicandleco.com/wp-content/uploads/2026/05/full-artifact.png" alt="Full Experience"/><main class="wrap"><h1>Full Experience</h1>
<section class="card"><p class="muted">Complete your profile, checkout, then render your artifact.</p>
<div class="row"><label>Name<input id="name"/></label><label>Birth Month<input id="birthMonth" type="number" min="1" max="12"/></label><label>Birth Day<input id="birthDay" type="number" min="1" max="31"/></label></div>
<div class="row"><label>Birth Year<input id="birthYear" type="number" min="1900" max="2099"/></label><label>Tarot Archetype<select id="tarotCard"><option value="fool">fool</option></select></label><label>Focus<select id="focus"><option value="tarot">My Cards</option><option value="zodiac">My Birth Energy</option><option value="aura">My Aura</option><option value="full_artifact">Combine Everything</option></select></label></div>
<div class="actions" style="margin-top:12px"><button id="checkout" class="btn">Checkout Full Experience</button><button id="render" class="btn">Render My Artifact</button></div></section>
<section id="result" class="card result" style="display:none"></section>
</main>
<script>
const BASE='https://zodiac-1-gj38.onrender.com';
(function(){const p=new URLSearchParams(location.search);const sid=p.get('session_id');if(sid){localStorage.setItem('flame_session_id',sid);history.replaceState({},'',location.pathname);}})();
function payload(){return{name:name.value.trim(),birthMonth:+birthMonth.value,birthDay:+birthDay.value,birthYear:+birthYear.value,tarotCard:tarotCard.value,experience:focus.value};}
checkout.onclick=async()=>{const body=payload();localStorage.setItem('flame_pending_payload',JSON.stringify(body));const r=await fetch(BASE+'/api/create-checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({productType:'full_artifact'})});const d=await r.json();if(d.url)location.href=d.url;else alert(d.error||'Checkout failed');};
render.onclick=async()=>{const sid=localStorage.getItem('flame_session_id');const body=JSON.parse(localStorage.getItem('flame_pending_payload')||'null');if(!sid||!body)return alert('Complete checkout first.');const r=await fetch(BASE+'/api/render-flame',{method:'POST',headers:{'Content-Type':'application/json','x-flame-session-id':sid},body:JSON.stringify(body)});const d=await r.json();if(!r.ok)return alert(d.error||'Render failed');result.style.display='block';result.innerHTML=`<h2>${d.artifactTitle||'Your Artifact'}</h2><p class="muted">${d.identityLine||''}</p><img src="${d.mockupImage||''}" alt="Artifact"/><p>${d.poeticReading||''}</p><p><strong>Scent Profile:</strong> ${(d.scentProfile||[]).join(', ')}</p>`;};
</script></body></html>
